name: Build Desktop (.exe)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Telepromt IA ${{ github.ref_name }}"
          releaseBody: |
            ## Telepromt IA ${{ github.ref_name }}

            ### Instalación
            1. Descargá el archivo `.exe` o el instalador `.msi`
            2. Ejecutalo como administrador
            3. Iniciá sesión con tu cuenta

            ### Notas
            - El overlay es invisible en screen share por defecto
            - Atajos: `Ctrl+Shift+T` (toggle), `Ctrl+Shift+M` (mouse), `Ctrl+Shift+C` (limpiar)
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
