name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Public anon key — safe to include in CI (not a secret)
          NEXT_PUBLIC_SUPABASE_URL: https://wkpkgvcfkfiqykkicjob.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrcGtndmNma2ZpcXlra2ljam9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTQyNjgsImV4cCI6MjA4OTQzMDI2OH0.pDLmUYKm79bg1hG7r57N2s7X0e00GPNRkSFvcMZfFsA
          NEXT_PUBLIC_APP_URL: https://telepromt-ia.vercel.app
          NEXT_PUBLIC_API_URL: https://backend-production-c314.up.railway.app

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Tests
        run: python -m pytest tests/ -v
        env:
          SUPABASE_JWT_SECRET: test-secret-for-ci
          CORS_ORIGINS: http://localhost:3000
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key
          DEEPGRAM_API_KEY: test-key
          MERCADOPAGO_ACCESS_TOKEN: test-token
